    <meta charset="UTF-8" />

    <title>Hiking & Camping Tracker</title>
    <script>
      // GitHub Pages SPA redirect trick
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          var path = redirect.replace(/^\//, '').replace(/^backpackingtracker\//, '');
          if (path) {
            var target = window.location.origin + '/backpackingtracker/#' + path;
            window.location.replace(target);
          }
        }
      })();
    </script>
